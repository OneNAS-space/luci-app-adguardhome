name: Auto sync and sanitize upstream repo
permissions:
  contents: write

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '!**/patches/**'
      - '!**/.github/**'

env:
  TZ: Asia/Shanghai

jobs:
  sync-and-sanitize:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出当前仓库
      - name: Checkout target repo
        uses: actions/checkout@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # 2. 配置 Git 机器人信息
      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # 3. 添加上游仓库并获取
      - name: Add upstream and fetch
        run: |
          git remote add upstream https://github.com/openwrt/luci.git || true
          git fetch upstream master

      # 4. 更新特定目录（保持你的强力清理逻辑）
      - name: Update luci-app-adguardhome from upstream
        run: |
          find . -mindepth 1 -maxdepth 1 \
            ! -name '.git' \
            ! -name '.github' \
            ! -name 'LICENSE' \
            ! -name 'SECURITY.md' \
            ! -name 'patches' \
            ! -name '.prepare.sh' \
            -exec rm -rf {} +
          
          git checkout upstream/master -- applications/luci-app-adguardhome
          mv applications/luci-app-adguardhome/* .
          rm -rf applications

      # 5. 【合并进来】清洗 Makefile 依赖
      - name: Sanitize Makefile Dependencies
        run: |
          for f in $(find . -type f -name "Makefile"); do
            if grep -q -i "adguardhome" "$f"; then
              echo "🩹 Sanitizing dependencies in $f"
              sed -i -E 's/[[:space:]]+\+adguardhome//gI' "$f"
              sed -i -E 's/\+adguardhome[[:space:]]+//gI' "$f"
              sed -i -E 's/\+adguardhome//gI' "$f"
              sed -i -E '/LUCI_EXTRA_DEPENDS.*adguardhome/Id' "$f"
              if ! grep -q "PKG_UNPACK" "$f"; then
                echo "🚀 Injecting PKG_UNPACK hook under LUCI_PKGARCH"
                sed -i '/LUCI_PKGARCH:=all/a PKG_UNPACK:=$(CURDIR)/.prepare.sh $(PKG_NAME) $(CURDIR) $(PKG_BUILD_DIR)' "$f"
              fi
            fi
          done

      # 6. 【合并进来】注入官方后端配置文件到当前的 root 矩阵
      - name: Inject Upstream Configurations into LuCI Root
        run: |
          mkdir -p root/etc/capabilities
          mkdir -p root/etc/config
          mkdir -p root/etc/init.d
          mkdir -p root/etc/sysctl.d
          mkdir -p root/etc/uci-defaults

          UPSTREAM_RAW="https://raw.githubusercontent.com/openwrt/packages/master/net/adguardhome/files"

          echo "📥 Downloading official configuration files..."
          curl -sLo root/etc/capabilities/adguardhome.json "${UPSTREAM_RAW}/adguardhome.json"
          curl -sLo root/etc/config/adguardhome          "${UPSTREAM_RAW}/adguardhome.conf"
          curl -sLo root/etc/init.d/adguardhome          "${UPSTREAM_RAW}/adguardhome.init"
          curl -sLo root/etc/sysctl.d/50-adguardhome.conf "${UPSTREAM_RAW}/adguardhome.sysctl"
          curl -sLo root/etc/uci-defaults/adguardhome    "${UPSTREAM_RAW}/adguardhome.defaults"

          chmod +x root/etc/init.d/adguardhome
          chmod +x root/etc/uci-defaults/adguardhome

      # 7. 【合并进来】修正启动脚本 (移除 --no-check-update)
      #- name: Patch Init Script
      #  run: |
      #    TARGET_INIT="root/etc/init.d/adguardhome"
      #    if [ -f "$TARGET_INIT" ]; then
      #      echo "🔧 Patching --no-check-update inside init script..."
      #      sed -i 's/procd_append_param command --no-check-update/# procd_append_param command --no-check-update/g' "$TARGET_INIT"
      #    fi

      # 8. ACL 打补丁
      - name: Apply custom Patches
        run: |
          if [ -f "patches/init.patch" ]; then
            patch -p1 < patches/init.patch
            echo "✅ init patch applied successfully!"
          else
            echo "❌ Error: patches/init.patch not found in your repository!"
            exit 1
          fi

          if [ -f "patches/acl.patch" ]; then
            patch -p1 < patches/acl.patch
            echo "✅ ACL patch applied successfully!"
          else
            echo "❌ Error: patches/acl.patch not found in your repository!"
            exit 1
          fi

          if [ -f "patches/config.patch" ]; then
            patch -p1 < patches/config.patch
            echo "✅ config patch applied successfully!"
          else
            echo "❌ Error: patches/config.patch not found in your repository!"
            exit 1
          fi

          if [ ! -f "root/usr/share/AdGuardHome/adguardhome.nft.tpl" ]; then
            if [ -f "patches/nft_tpl.patch" ]; then
              patch -p1 < patches/nft_tpl.patch
              echo "✅ nft_tpl patch applied successfully!"
            else
              echo "❌ Error: patches/nft_tpl.patch not found in your repository!"
            exit 1
            fi
          else
            echo "✅ adguardhome.nft.tpl exists, skipped"
          fi

          if [ ! -f "root/etc/nftables.d/99-adguardhome.nft" ]; then
            if [ -f "patches/nft.patch" ]; then
              patch -p1 < patches/nft.patch
              echo "✅ nft patch applied successfully!"
            else
              echo "❌ Error: patches/nft.patch not found in your repository!"
            exit 1
            fi
          else
            echo "✅ 99-adguardhome.nft exists, skipped"
          fi

          if [ ! -f "root/usr/share/AdGuardHome/update_core.sh" ]; then
            if [ -f "patches/update_core.patch" ]; then
              patch -p1 < patches/update_core.patch
              chmod +x root/usr/share/AdGuardHome/update_core.sh
              echo "✅ create update_core.sh successfully!"
            else
              echo "❌ Error: patches/update_core.patch not found in your repository!"
              exit 1
            fi
          else
            echo "✅ update_core.sh exists, skipped"
          fi

          if [ ! -f "root/usr/share/AdGuardHome/control.sh" ]; then
            if [ -f "patches/control.patch" ]; then
              patch -p1 < patches/control.patch
              chmod +x root/usr/share/AdGuardHome/control.sh
              echo "✅ create control.sh successfully!"
            else
              echo "❌ Error: patches/control.patch not found in your repository!"
              exit 1
            fi
          else
            echo "✅ control.sh exists, skipped"
          fi

          if [ ! -f "root/usr/share/AdGuardHome/watchconfig.sh" ]; then
            if [ -f "patches/watchconfig.patch" ]; then
              patch -p1 < patches/watchconfig.patch
              chmod +x root/usr/share/AdGuardHome/watchconfig.sh
              echo "✅ create watchconfig.sh successfully!"
            else
              echo "❌ Error: patches/watchconfig.patch not found in your repository!"
              exit 1
            fi
          else
            echo "✅ watchconfig.sh exists, skipped"
          fi

          if [ ! -f ".prepare.sh" ]; then
            if [ -f "patches/prepare.patch" ]; then
              patch -p1 < patches/prepare.patch
              chmod +x .prepare.sh
              echo "✅ create .prepare.sh successfully!"
            else
              echo "❌ Error: patches/prepare.patch not found in your repository!"
              exit 1
            fi
          else
            echo "✅ .prepare.sh exists, skipped"
          fi

      # 9. 一次性提交并推送
      - name: Commit and push
        run: |
          # 暂存所有变更（包括新创建的 root 文件夹）
          git add -A
          
          # 如果没有发生任何实质性变化，直接退出
          if git diff-index --quiet HEAD --; then
            echo "Genius! No upstream updates or modification changes detected."
            exit 0
          fi
          
          git commit -m "Sync & Sanitize: automatically decoupled backend and injected official configs"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main --force
