name: Auto sync and sanitize upstream repo
permissions:
  contents: write

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '!**/patches/**'
      - '!**/.github/**'
      - '!README.md'
      - '!LICENSE'
      - '!SECURITY.md'

env:
  TZ: Asia/Shanghai

jobs:
  sync-and-sanitize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repo
        uses: actions/checkout@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstreams and fetch
        run: |
          git remote add upstream-luci https://github.com/openwrt/luci.git || true
          git remote add upstream-packages https://github.com/openwrt/packages.git || true
          
          echo "🔄 Fetching upstream-luci..."
          git fetch upstream-luci master
          echo "🔄 Fetching upstream-packages..."
          git fetch upstream-packages master

      - name: Fetch and Compare Official Version
        run: |
          FEED_URL="https://downloads.openwrt.org/releases/packages-25.12/x86_64/luci/index.json"
          TARGET_PKG="luci-app-adguardhome"
          NEW_VER=$(curl -sL "$FEED_URL" | jq -r --arg pkg "$TARGET_PKG" '.packages[$pkg]')
          OLD_VER=$(cat .official_json_version 2>/dev/null || echo "none")
          
          echo "NEW_VER=$NEW_VER" >> $GITHUB_ENV
          
          if [ "$NEW_VER" != "$OLD_VER" ]; then
             echo "VERSION_CHANGED=true" >> $GITHUB_ENV
             echo "✅ Version changed: $OLD_VER -> $NEW_VER"
             echo "$NEW_VER" > .official_json_version
          else
             echo "VERSION_CHANGED=false" >> $GITHUB_ENV
          fi

      - name: Assemble Raw Materials & Generate Precision Changelog
        run: |
          # 1. 严格切换/创建 Official-original 孤儿分支
          if git ls-remote --exit-code --heads origin Official-original; then
            git fetch origin Official-original
            git checkout Official-original
          else
            echo "Creating a pristine orphan branch..."
            git checkout --orphan Official-original
          fi

          # 2. 读取上一次同步的锚点 Hash
          if [ -f .upstream_meta ]; then
            OLD_LUCI_HASH=$(sed -n '1p' .upstream_meta)
            OLD_PKG_HASH=$(sed -n '2p' .upstream_meta)
          else
            OLD_LUCI_HASH=$(git rev-parse upstream-luci/master~5)
            OLD_PKG_HASH=$(git rev-parse upstream-packages/master~5)
          fi

          # 3. 获取当前最新的上游 Hash
          NEW_LUCI_HASH=$(git rev-parse upstream-luci/master)
          NEW_PKG_HASH=$(git rev-parse upstream-packages/master)

          # 4. 提取历史记录
          LUCI_CHANGELOG=$(git log --oneline ${OLD_LUCI_HASH}..${NEW_LUCI_HASH} -- applications/luci-app-adguardhome)
          PKG_CHANGELOG=$(git log --oneline ${OLD_PKG_HASH}..${NEW_PKG_HASH} -- net/adguardhome/files)

          [ -z "$LUCI_CHANGELOG" ] && LUCI_CHANGELOG="No changes in this range."
          [ -z "$PKG_CHANGELOG" ] && PKG_CHANGELOG="No changes in this range."

          # 5. 核心修复：用大括号包裹，将整段输出准确推入 $GITHUB_ENV
          {
            echo "SYNC_COMMIT_MSG<<EOF_GHA"
            echo "Sync: Combined upstream updates"
            echo ""
            echo "===== 📌 LuCI Frontend Commits ====="
            echo "$LUCI_CHANGELOG"
            echo ""
            echo "===== 📌 Packages Backend Commits ====="
            echo "$PKG_CHANGELOG"
            
            # 关键点：动态添加版本更新信息
            if [ "$VERSION_CHANGED" = "true" ]; then
              echo ""
              echo "===== 🚀 Official Version Update ====="
              echo "New Official Version: $NEW_VER"
            fi
            
            echo "EOF_GHA"
          } >> $GITHUB_ENV

          # 6. 净化工作区 (保留元数据文件)
          git rm -rf --cached . 2>/dev/null || true
          find . -mindepth 1 -maxdepth 1 ! -name '.git' ! -name '.upstream_meta' -exec rm -rf {} +
          
          # 7. 更新锚点文件
          echo "$NEW_LUCI_HASH" > .upstream_meta
          echo "$NEW_PKG_HASH" >> .upstream_meta

          echo "📥 Extracting frontend from upstream-luci..."
          git checkout upstream-luci/master -- applications/luci-app-adguardhome
          mv applications/luci-app-adguardhome/* .
          rm -rf applications

          echo "📥 Extracting backend configurations from upstream-packages..."
          git checkout upstream-packages/master -- net/adguardhome/files
          
          mkdir -p root/etc/capabilities root/etc/config root/etc/init.d root/etc/sysctl.d root/etc/uci-defaults
          mv net/adguardhome/files/adguardhome.json root/etc/capabilities/
          mv net/adguardhome/files/adguardhome.conf root/etc/config/adguardhome
          mv net/adguardhome/files/adguardhome.init root/etc/init.d/adguardhome
          mv net/adguardhome/files/adguardhome.sysctl root/etc/sysctl.d/50-adguardhome.conf
          mv net/adguardhome/files/adguardhome.defaults root/etc/uci-defaults/adguardhome
          rm -rf net

          chmod +x root/etc/init.d/adguardhome root/etc/uci-defaults/adguardhome

      - name: Push completely assembled raw files to Official-original
        run: |
          git add -A
          if ! git diff-index --quiet HEAD --; then
            git commit -m "$SYNC_COMMIT_MSG"
            git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" Official-original --force
          else
            echo "Perfect. No updates detected in either frontend or backend upstreams."
          fi

      - name: Switch to main and prepare patching environment
        run: |
          git checkout main
          
          echo "🧹 Cleaning up legacy generated files in main..."
          find . -mindepth 1 -maxdepth 1 \
            ! -name '.git' \
            ! -name '.github' \
            ! -name 'patches' \
            ! -name 'README.md' \
            ! -name 'LICENSE' \
            ! -name 'SECURITY.md' \
            ! -name '.upstream_meta' \
            ! -name '.official_json_version' \
            -exec rm -rf {} +
          
          echo "📥 Overlaying pristine raw materials from Official-original..."
          git checkout Official-original -- .
          
      - name: Apply Custom Patches Pipeline
        run: |
          set -e

          PATCH_LIST="
            00_makefile.patch
            01_init.patch
            02_acl.patch
            03_config_js.patch
            04_etc_config.patch
            05_nft_tpl.patch
            06_nft.patch
            07_update_core.patch
            08_control.patch
            09_watchconfig.patch
            10_yaml_helper.patch
            11_AGH_yaml.patch
            12_twin-bcrypt.patch
            prepare.patch
          "

          for patch_file in $PATCH_LIST; do
            echo ""
            if [ -f "patches/$patch_file" ]; then
              echo "🩹 Applying patches/$patch_file ..."
              patch --batch -p1 < "patches/$patch_file"
              echo "✅ $patch_file applied successfully!"
            else
              echo "❌ Critical Error: patches/$patch_file missing!"
              exit 1
            fi
          done

          echo ""
          echo "🔐 Setting executable permissions for runtime scripts..."
          chmod +x root/usr/share/AdGuardHome/*.sh 2>/dev/null || true
          chmod +x .prepare.sh 2>/dev/null || true

      - name: Commit and push to main
        run: |
          git add -A
          
          if git diff-index --quiet HEAD --; then
            # 即使代码没变，但如果版本号变了，我们需要在这里做一个额外判断
            if [ "$VERSION_CHANGED" = "false" ]; then
              echo "Genius! No modification changes detected on main branch."
              exit 0
            fi
          fi
          
          git commit -m "[Patched] $SYNC_COMMIT_MSG"
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" main --force
