name: Auto sync and sanitize upstream repo
permissions:
  contents: write

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
  
env:
  TZ: Asia/Shanghai

jobs:
  sync-and-sanitize:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出当前仓库
      - name: Checkout target repo
        uses: actions/checkout@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # 2. 配置 Git 机器人信息
      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # 3. 添加上游仓库并获取
      - name: Add upstream and fetch
        run: |
          git remote add upstream https://github.com/openwrt/luci.git || true
          git fetch upstream master

      # 4. 更新特定目录（保持你的强力清理逻辑）
      - name: Update luci-app-adguardhome from upstream
        run: |
          find . -mindepth 1 -maxdepth 1 \
            ! -name '.git' \
            ! -name '.github' \
            ! -name 'LICENSE' \
            ! -name 'SECURITY.md' \
            -exec rm -rf {} +
          
          git checkout upstream/master -- applications/luci-app-adguardhome
          mv applications/luci-app-adguardhome/* .
          rm -rf applications

      # 5. 【合并进来】清洗 Makefile 依赖
      - name: Sanitize Makefile Dependencies
        run: |
          for f in $(find . -type f -name "Makefile"); do
            if grep -q -i "adguardhome" "$f"; then
              echo "🩹 Sanitizing dependencies in $f"
              sed -i -E 's/[[:space:]]+\+adguardhome//gI' "$f"
              sed -i -E 's/\+adguardhome[[:space:]]+//gI' "$f"
              sed -i -E 's/\+adguardhome//gI' "$f"
              sed -i -E '/LUCI_EXTRA_DEPENDS.*adguardhome/Id' "$f"
            fi
          done

      # 6. 【合并进来】注入官方后端配置文件到当前的 root 矩阵
      - name: Inject Upstream Configurations into LuCI Root
        run: |
          mkdir -p root/etc/capabilities
          mkdir -p root/etc/config
          mkdir -p root/etc/init.d
          mkdir -p root/etc/sysctl.d
          mkdir -p root/etc/uci-defaults

          UPSTREAM_RAW="https://raw.githubusercontent.com/openwrt/packages/master/net/adguardhome/files"

          echo "📥 Downloading official configuration files..."
          curl -sLo root/etc/capabilities/adguardhome.json "${UPSTREAM_RAW}/adguardhome.json"
          curl -sLo root/etc/config/adguardhome          "${UPSTREAM_RAW}/adguardhome.conf"
          curl -sLo root/etc/init.d/adguardhome          "${UPSTREAM_RAW}/adguardhome.init"
          curl -sLo root/etc/sysctl.d/50-adguardhome.conf "${UPSTREAM_RAW}/adguardhome.sysctl"
          curl -sLo root/etc/uci-defaults/adguardhome    "${UPSTREAM_RAW}/adguardhome.defaults"

          chmod +x root/etc/init.d/adguardhome
          chmod +x root/etc/uci-defaults/adguardhome

      # 7. 【合并进来】修正启动脚本 (移除 --no-check-update)
      - name: Patch Init Script
        run: |
          TARGET_INIT="root/etc/init.d/adguardhome"
          if [ -f "$TARGET_INIT" ]; then
            echo "🔧 Patching --no-check-update inside init script..."
            sed -i 's/procd_append_param command --no-check-update/# procd_append_param command --no-check-update/g' "$TARGET_INIT"
          fi

      # 8. 动态生成脱脂纯净版的核心更新脚本
      - name: Inject Custom Update Core Script
        run: |
          SCRIPT_DIR="root/usr/share/AdGuardHome"
          mkdir -p "$SCRIPT_DIR"
          
          cat << 'EOF' > "$SCRIPT_DIR/update_core.sh"
          #!/bin/sh

          PATH="/usr/sbin:/usr/bin:/sbin:/bin"
          binpath="/usr/bin/AdGuardHome"
          update_mode=$1

          enabled=$(uci get adguardhome.config.enabled 2>/dev/null || true)
          core_version=$(uci get adguardhome.config.core_version 2>/dev/null || true)
          update_url=$(uci get adguardhome.config.update_url 2>/dev/null || true)

          case "${core_version}" in
          beta)
          	core_api_url=https://api.github.com/repos/AdguardTeam/AdGuardHome/releases
          	;;
          *)
          	core_api_url=https://api.github.com/repos/AdguardTeam/AdGuardHome/releases/latest
          	;;
          esac

          Check_Task(){
          	running_tasks="$(ps w | grep -v grep | grep 'AdGuardHome' | grep 'update_core' | wc -l)"
          	case $1 in
          	force)
          		echo "Force update requested"
          		echo "Killing ${running_tasks} running tasks ..."
          		ps w | grep -v grep | grep -v $$ | grep 'AdGuardHome' | grep 'update_core' | awk '{print $1}' | xargs kill -9 2>/dev/null
          		;;
          	*)
          		[ "${running_tasks}" -gt 2 ] && echo -e "There are ${running_tasks} update tasks already running. Please wait or stop them manually." && EXIT 2
          		;;
          	esac
          }

          Check_Downloader() {
          	if command -v curl >/dev/null 2>&1; then
          		PKG="curl"
          		return
          	fi

          	if command -v wget >/dev/null 2>&1; then
          		PKG="wget"
          		return
          	fi

          	echo "Neither curl nor wget is installed, cannot check updates!" >&2
          	EXIT 1
          }

          Check_Updates(){
          	Check_Downloader
          	case "${PKG}" in
          	curl)
          		Downloader="curl -L -k -o"
          		_Downloader="curl -s"
          	;;
          	wget)
          		Downloader="wget --no-check-certificate -T 5 -O"
          		_Downloader="wget -q -O -"
          	;;
          	esac
          	echo "[${PKG}] Checking for updates ..."
          	Cloud_Version="$(${_Downloader} ${core_api_url} 2>/dev/null | grep 'tag_name' | egrep -o "v[0-9].+[0-9.]" | awk 'NR==1')"
          	if [ -z "${Cloud_Version}" ]; then
          		echo "Failed to check updates, please check network." >&2
          		EXIT 1
          	fi

          	if [ -f "${binpath}" ]; then
          		Current_Version="$(${binpath} --version 2>/dev/null | egrep -o "v[0-9].+[0-9]" | sed -r 's/(.*), c(.*)/\1/')"
          	else
          		Current_Version="unknown"
          	fi
          	[ -z "${Current_Version}" ] && Current_Version="unknown"

          	echo "Binary path: ${binpath%/*}"
          	echo "Current version: ${Current_Version}"
          	echo "Latest version: ${Cloud_Version}"

          	if [ ! "${Cloud_Version}" = "${Current_Version}" ] || [ "$1" = force ]; then
          		Update_Core || EXIT 1
          	else
          		echo "Already up to date."
          		EXIT 0
          	fi
          	EXIT 0
          }

          Update_Core(){
          	rm -rf "/tmp/AdGuardHome_Update" > /dev/null 2>&1
          	mkdir -p "/tmp/AdGuardHome_Update" || { echo "无法创建临时目录"; EXIT 1; }

          	GET_Arch
          	eval link="${update_url}"
          	echo "Download link: ${link}"
          	echo "File name: ${link##*/}"
          	echo "Downloading AdGuardHome core ..."

          	if ! $Downloader "/tmp/AdGuardHome_Update/${link##*/}" "${link}"; then
          		echo "Download failed."
          		rm -rf "/tmp/AdGuardHome_Update"
          		EXIT 1
          	fi

          	if [ "${link##*.}" = "gz" ]; then
          		echo "Extracting AdGuardHome ..."
          		if ! tar -zxf "/tmp/AdGuardHome_Update/${link##*/}" -C "/tmp/AdGuardHome_Update/"; then
          			echo "Extraction failed!"
          			rm -rf "/tmp/AdGuardHome_Update"
          			EXIT 1
          		fi
          		if [ ! -e "/tmp/AdGuardHome_Update/AdGuardHome/AdGuardHome" ]; then
          			echo "Extraction failed: binary not found!"
          			rm -rf "/tmp/AdGuardHome_Update"
          			EXIT 1
          		fi
          		downloadbin="/tmp/AdGuardHome_Update/AdGuardHome/AdGuardHome"
          	else
          		downloadbin="/tmp/AdGuardHome_Update/${link##*/}"
          	fi

          	chmod +x "${downloadbin}" 2>/dev/null || true
          	echo "Core size: $(awk 'BEGIN{printf "%.2fMB\n",'$((`ls -l $downloadbin | awk '{print $5}'`))'/1000000}')"

          	/etc/init.d/adguardhome stop > /dev/null 2>&1
          	echo "Moving AdGuardHome binary to ${binpath%/*} ..."

          	if ! mv -f "${downloadbin}" "${binpath}"; then
          		echo -e "AdGuardHome 核心移动失败!\n可能是设备空间不足导致。"
          		rm -rf "/tmp/AdGuardHome_Update"
          		EXIT 1
          	fi

          	rm -rf /tmp/AdGuardHome_Update
          	chmod +x ${binpath}

          	if [ "${enabled}" = 1 ]; then
          		echo "Restarting AdGuardHome service ..."
          		/etc/init.d/adguardhome restart
          	fi

          	echo "AdGuardHome core updated successfully!"
          	touch /var/run/update_core_done
          }

          GET_Arch() {
          	Archt="$(uname -m)"
          	case "${Archt}" in
          	i386|i686)
          		Arch="i386"
          	;;
          	x86_64|amd64)
          		Arch="amd64"
          	;;
          	mipsel|mipsel*)
          		Arch="mipsle_softfloat"
          	;;
          	mips|mips*)
          		Arch="mips_softfloat"
          	;;
          	mips64el)
          		Arch="mips64le_softfloat"
          	;;
          	mips64)
          		Arch="mips64_softfloat"
          	;;
          	armv5*|armv5l|armv5tel)
          		Arch="armv5"
          	;;
          	armv6*|armv6l)
          		Arch="armv6"
          	;;
          	armv7*|armv7l)
          		Arch="armv7"
          	;;
          	arm|armhf)
          		Arch="armv7"
          	;;
          	aarch64)
          		Arch="arm64"
          	;;
          	*)
          		echo "Unsupported architecture: [${Archt}]" 
          		EXIT 1
          	esac
          	echo "Detected architecture: ${Arch}"
          }

          EXIT(){
          	rm -rf /var/run/update_core $LOCKU 2>/dev/null
          	[ "$1" != 0 ] && touch /var/run/update_core_error
          	exit $1
          }

          main(){
          	Check_Task ${update_mode}
          	Check_Updates ${update_mode}
          }

          trap "EXIT 1" SIGTERM SIGINT
          touch /var/run/update_core
          rm -rf /var/run/update_core_error 2>/dev/null

          main
          EOF
          
          chmod +x "$SCRIPT_DIR/update_core.sh"

      # 9. 一次性提交并推送
      - name: Commit and push
        run: |
          # 暂存所有变更（包括新创建的 root 文件夹）
          git add -A
          
          # 如果没有发生任何实质性变化，直接退出
          if git diff-index --quiet HEAD --; then
            echo "Genius! No upstream updates or modification changes detected."
            exit 0
          fi
          
          git commit -m "Sync & Sanitize: automatically decoupled backend and injected official configs"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main --force
