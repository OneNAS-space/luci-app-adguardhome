name: Auto sync and sanitize upstream repo
permissions:
  contents: write

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '!**/patches/**'
      - '!**/.github/**'

env:
  TZ: Asia/Shanghai

jobs:
  sync-and-sanitize:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出当前仓库
      - name: Checkout target repo
        uses: actions/checkout@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # 2. 配置 Git 机器人信息
      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # 3. 添加上游仓库并获取
      - name: Add upstream and fetch
        run: |
          git remote add upstream https://github.com/openwrt/luci.git || true
          git fetch upstream master

      # 4. 更新特定目录（保持你的强力清理逻辑）
      - name: Update luci-app-adguardhome from upstream
        run: |
          find . -mindepth 1 -maxdepth 1 \
            ! -name '.git' \
            ! -name '.github' \
            ! -name 'LICENSE' \
            ! -name 'SECURITY.md' \
            ! -name 'patches' \
            ! -name '.prepare.sh' \
            -exec rm -rf {} +
          
          git checkout upstream/master -- applications/luci-app-adguardhome
          mv applications/luci-app-adguardhome/* .
          rm -rf applications

      # 5. 【合并进来】清洗 Makefile 依赖
      #- name: Sanitize Makefile Dependencies
      #  run: |
      #    for f in $(find . -type f -name "Makefile"); do
      #      if grep -q -i "adguardhome" "$f"; then
      #        echo "🩹 Sanitizing dependencies in $f"
      #        sed -i -E 's/[[:space:]]+\+adguardhome//gI' "$f"
      #        sed -i -E 's/\+adguardhome[[:space:]]+//gI' "$f"
      #        sed -i -E 's/\+adguardhome//gI' "$f"
      #        sed -i -E '/LUCI_EXTRA_DEPENDS.*adguardhome/Id' "$f"
      #        if ! grep -q "PKG_UNPACK" "$f"; then
      #          echo "🚀 Injecting PKG_UNPACK hook under LUCI_PKGARCH"
      #          sed -i '/LUCI_PKGARCH:=all/a PKG_UNPACK:=$(CURDIR)/.prepare.sh $(PKG_NAME) $(CURDIR) $(PKG_BUILD_DIR)' "$f"
      #        fi
      #      fi
      #    done

      # 6. 【合并进来】注入官方后端配置文件到当前的 root 矩阵
      - name: Inject Upstream Configurations into LuCI Root
        run: |
          mkdir -p root/etc/capabilities
          mkdir -p root/etc/config
          mkdir -p root/etc/init.d
          mkdir -p root/etc/sysctl.d
          mkdir -p root/etc/uci-defaults

          UPSTREAM_RAW="https://raw.githubusercontent.com/openwrt/packages/master/net/adguardhome/files"

          echo "📥 Downloading official configuration files..."
          curl -sLo root/etc/capabilities/adguardhome.json "${UPSTREAM_RAW}/adguardhome.json"
          curl -sLo root/etc/config/adguardhome          "${UPSTREAM_RAW}/adguardhome.conf"
          curl -sLo root/etc/init.d/adguardhome          "${UPSTREAM_RAW}/adguardhome.init"
          curl -sLo root/etc/sysctl.d/50-adguardhome.conf "${UPSTREAM_RAW}/adguardhome.sysctl"
          curl -sLo root/etc/uci-defaults/adguardhome    "${UPSTREAM_RAW}/adguardhome.defaults"

          chmod +x root/etc/init.d/adguardhome
          chmod +x root/etc/uci-defaults/adguardhome

      # 7. 【合并进来】修正启动脚本 (移除 --no-check-update)
      #- name: Patch Init Script
      #  run: |
      #    TARGET_INIT="root/etc/init.d/adguardhome"
      #    if [ -f "$TARGET_INIT" ]; then
      #      echo "🔧 Patching --no-check-update inside init script..."
      #      sed -i 's/procd_append_param command --no-check-update/# procd_append_param command --no-check-update/g' "$TARGET_INIT"
      #    fi

      # 8. 系统文件打补丁
      - name: Apply Custom Patches Pipeline
        run: |
          set -e

          PATCH_LIST="
            00_makefile.patch
            01_init.patch
            02_acl.patch
            03_config.patch
            04_config_file.patch
            05_nft_tpl.patch
            06_nft.patch
            07_update_core.patch
            08_control.patch
            09_watchconfig.patch
          "

          for patch_file in $PATCH_LIST; do
            echo ""
            if [ -f "patches/$patch_file" ]; then
              echo "🩹 Applying patches/$patch_file ..."
              patch -p1 < "patches/$patch_file"
              echo "✅ $patch_file applied successfully!"
            else
              echo "❌ Critical Error: patches/$patch_file missing!"
              exit 1
            fi
          done

          echo ""
          if [ ! -f ".prepare.sh" ]; then
            if [ -f "patches/prepare.patch" ]; then
              echo "🚀 .prepare.sh not found, initializing via prepare.patch..."
              patch -p1 < patches/prepare.patch
              echo "✅ .prepare.sh created successfully!"
            else
              echo "❌ Critical Error: patches/prepare.patch missing!"
              exit 1
            fi
          else
            echo "🔐 .prepare.sh already exists, safely skipping prepare.patch to avoid reject conflict."
          fi

          echo ""
          echo "🔐 Setting executable permissions for runtime scripts..."
          chmod +x root/usr/share/AdGuardHome/*.sh 2>/dev/null || true
          chmod +x .prepare.sh 2>/dev/null || true

      # 9. 一次性提交并推送
      - name: Commit and push
        run: |
          git add -A
          
          if git diff-index --quiet HEAD --; then
            echo "Genius! No upstream updates or modification changes detected."
            exit 0
          fi
          
          git commit -m "Sync & Sanitize: automatically decoupled backend and injected official configs"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main --force
