permissions:
  contents: write
name: Build luci-app-adguardhome Package

on:
  workflow_run:
    workflows: ["Auto sync and sanitize upstream repo"]
    types:
      - completed
      
  push:
    branches:
      - main
    paths:
      - 'Makefile'
      - '!**/patches/**'
      - '!**/.github/**'
  workflow_dispatch:

jobs:
  check:
    name: 1. Resolve Version
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check_release.outputs.should_build }}
      tag_name: ${{ steps.version.outputs.tag_name }}
      main_version: ${{ steps.version.outputs.main_version }}
      
    steps:
      - name: 🧾 Checkout repo
        uses: actions/checkout@v6

      - name: 🏷️ Extract version info from Git Commit
        id: version
        run: |
          set -euo pipefail

          COMMIT_TIMESTAMP=$(git log -1 --format=%ct)
          COMMIT_SHA=$(git rev-parse --short=7 HEAD)

          PKG_VERSION_DATE=$(date -u -d "@${COMMIT_TIMESTAMP}" +'%y.%j')
          PKG_VERSION_SECS=$(printf "%05d" $(( COMMIT_TIMESTAMP % 86400 )))
          OFFICIAL_VERSION="${PKG_VERSION_DATE}.${PKG_VERSION_SECS}~${COMMIT_SHA}"
          GIT_TAG_VERSION="${PKG_VERSION_DATE}.${PKG_VERSION_SECS}"

          echo "tag_name=v${GIT_TAG_VERSION}" >> "$GITHUB_OUTPUT"
          echo "main_version=${OFFICIAL_VERSION}" >> "$GITHUB_OUTPUT"

      - name: 🧐 Check if release exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag_name }}
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Manual run detected. Forcing build."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists. Skipping build."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "Release $TAG does not exist. Proceeding with build."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build for ${{ matrix.version }} / ${{ matrix.target }}
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - version: openwrt-24.10
            target: x86_64
            suffix: all
          - version: openwrt-25.12
            target: x86_64
            suffix: noarch

    outputs:
      version: ${{ steps.patch_version.outputs.version }}

    steps:
      - name: 🧾 Checkout repo
        uses: actions/checkout@v6

      - name: 📛 Set PKG_NAME from repo
        run: echo "PKG_NAME=${{ github.event.repository.name }}" >> "$GITHUB_ENV"

      - name: 🧰 Set up Feed structure
        run: |
          set -e
          mkdir -p package
          printf 'include $(TOPDIR)/feeds/luci/luci.mk\n' > package/luci.mk

          mkdir -p feed/luci/applications/${PKG_NAME}

          mkdir -p feed/luci
          printf 'include $(TOPDIR)/feeds/luci/luci.mk\n' > feed/luci/luci.mk

          rsync -av \
            --exclude='.git' \
            --exclude='feed' \
            --exclude='.github' \
            --exclude='patches' \
            ./ feed/luci/applications/${PKG_NAME}/

      - name: 🩹 Patch Makefile with dynamic version
        id: patch_version
        run: |
          set -euo pipefail
          OFFICIAL_VERSION="${{ needs.check.outputs.main_version }}"
          echo "🚀 Using official standard version: ${OFFICIAL_VERSION}"

          MF="feed/luci/applications/${PKG_NAME}/Makefile"
          sed -i '/^PKG_VERSION/d' "$MF"
          sed -i '/^PKG_RELEASE/d' "$MF"
          sed -i "/^LUCI_NAME/a PKG_RELEASE:=" "$MF"
          sed -i "/^LUCI_NAME/a PKG_VERSION:=${OFFICIAL_VERSION}" "$MF"

          echo "✅ Patched Makefile metadata:"
          echo "version=${{ needs.check.outputs.tag_name }}" >> $GITHUB_OUTPUT
          echo "--- 📄 Full Makefile Content Preview ---"
          cat "$MF"
          
      - name: 🧮 Compute ARCH
        run: |
          echo "ARCH=${{ matrix.target }}-${{ matrix.version }}" >> "$GITHUB_ENV"

      - name: 🏗️ Build with OpenWrt SDK
        uses: openwrt/gh-action-sdk@v11
        env:
          ARCH: ${{ env.ARCH }}
          FEEDNAME: jackie264
          PACKAGES: ${{ env.PKG_NAME }}
          INDEX: 0
          FEED_DIR: ${{ github.workspace }}/feed
          NO_SHFMT_CHECK: 1
          NO_REFRESH_CHECK: 1

      - name: 🔍 Debug build output
        run: |
          echo "=== Build directory structure ==="
          find . -name "*.ipk" -type f 2>/dev/null || echo "No .ipk files found"
          echo "=== bin directory structure ==="
          ls -la bin/ 2>/dev/null || echo "No bin directory found"
          if [ -d "bin/packages" ]; then
            echo "=== packages directory structure ==="
            find bin/packages/ -type f -name "*.ipk" 2>/dev/null || echo "No .ipk files in packages directory"
            echo "=== Full packages directory tree ==="
            ls -laR bin/packages/ 2>/dev/null || echo "No packages directory"
          fi

      - name: 📦 Upload artifact for ${{ matrix.target }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PKG_NAME }}-${{ matrix.target }}-${{ matrix.version }}
          path: |
            bin/packages/*/jackie264/${{ env.PKG_NAME }}*.ipk
            bin/packages/*/jackie264/${{ env.PKG_NAME }}*.apk
          if-no-files-found: ignore

  release:
    name: 3. Release & Deploy ${{ github.repository }}
    needs: [check, build]
    runs-on: ubuntu-latest

    steps:
      - name: 🧾 Checkout repo
        uses: actions/checkout@v6

      - name: ⬇️ Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./release-assets

      - name: 🗃️ Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.build.outputs.version }}
          name: Build-${{ needs.build.outputs.version }}
          files: |
            ./release-assets/**/*.ipk
            ./release-assets/**/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔑 Checkout custom-packages repo
        uses: actions/checkout@v6
        with:
          repository: OneNAS-space/custom-packages
          token: ${{ secrets.CUSTOM_PACKAGES_TOKEN }}
          path: custom-packages

      - name: 🚚 Update luci artifacts
        run: |
          set -e
          CURRENT_PKG="${{ github.event.repository.name }}"
          mkdir -p custom-packages/releases/packages-24.10/luci
          mkdir -p custom-packages/releases/packages-25.12/luci
          echo "Cleaning all old versions for $CURRENT_PKG before updating..."
          rm -f custom-packages/releases/packages-24.10/luci/${CURRENT_PKG}_*.ipk
          rm -f custom-packages/releases/packages-25.12/luci/${CURRENT_PKG}-*.apk
          find ./release-assets -type f \( -name "*.ipk" -o -name "*.apk" \) | while read -r f; do
            base=$(basename "$f")
            if [[ "$base" == *.ipk ]]; then
              echo "Deploying $base to releases/packages-24.10/luci/"
              cp "$f" custom-packages/releases/packages-24.10/luci/
            elif [[ "$base" == *.apk ]]; then
              echo "Deploying $base to releases/packages-25.12/luci/"
              cp "$f" custom-packages/releases/packages-25.12/luci/
            fi
          done
          echo "=== 24.10 Content ==="
          ls -la custom-packages/releases/packages-24.10/luci/${CURRENT_PKG}* || echo "No IPKs found"
          echo "=== 25.12 Content ==="
          ls -la custom-packages/releases/packages-25.12/luci/${CURRENT_PKG}* || echo "No APKs found"

          cd custom-packages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add releases/packages-24.10/luci/ releases/packages-25.12/luci/
          git commit -m "Update $CURRENT_PKG to ${{ needs.check.outputs.tag_name }}" || echo "No changes"
          for i in {1..5}; do
            git pull --rebase origin main && \
            git push origin main && break || \
            (echo "Conflict detected, retrying in 5s..." && sleep 5)
          done
