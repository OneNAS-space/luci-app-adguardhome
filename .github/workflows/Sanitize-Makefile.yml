name: Sanitize Makefile

on:
  workflow_dispatch:
  push:
    paths:
      - '**/Makefile'
  pull_request:
    paths:
      - '**/Makefile'

permissions:
  contents: write

jobs:
  sanitize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main

      - name: Remove unwanted deps from Makefile
        run: |
          changed=0
          
          # 1. 使用 find 彻底遍历，不受 git 状态限制
          for f in $(find . -type f -name "Makefile"); do
            echo "🔍 [Scanning file]: $f"
            
            # 2. 引入 -i 忽略大小写，防止 AdGuardHome 等大小写混淆
            if grep -q -i "adguardhome" "$f"; then
              echo "🎯 [Found target]: adguardhome dependency detected in $f, patching..."
              before=$(md5sum "$f")

              # 3. 清理 LUCI_DEPENDS 中的 +adguardhome (末尾加 I 忽略大小写)
              sed -i -E 's/[[:space:]]+\+adguardhome//gI' "$f"
              sed -i -E 's/\+adguardhome[[:space:]]+//gI' "$f"
              sed -i -E 's/\+adguardhome//gI' "$f"

              # 4. 物理擦除包含 LUCI_EXTRA_DEPENDS 且含 adguardhome 的整行 (末尾加 Id)
              sed -i -E '/LUCI_EXTRA_DEPENDS.*adguardhome/Id' "$f"

              after=$(md5sum "$f")
              if [ "$before" != "$after" ]; then
                echo "✅ [Success]: Successfully sanitized $f"
                changed=1
              fi
            fi
          done
          
          if [ $changed -eq 0 ]; then
            echo "⚠️ [Warning]: No changes were made to any Makefile."
          fi

      - name: Show diff
        run: git diff --color

      - name: Commit changes
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 检查是否有文件真正被修改
          if ! git diff --exit-code; then
            # -u 参数会自动暂存所有已被追踪且被修改的文件，完美避开通配符路径坑
            git add -u
            git commit -m "ci: sanitize adguardhome deps in Makefile"
            git push
          else
            echo "Nothing to commit"
          fi
