name: Test OpenWrt JSON API

on:
  workflow_dispatch: # 允许在 GitHub Actions 页面手动点击 "Run workflow" 测试

jobs:
  test-parsing:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and Parse index.json
        run: |
          # 1. 定义目标架构的官方索引地址和你要监控的包名
          FEED_URL="https://downloads.openwrt.org/releases/packages-25.12/x86_64/luci/index.json"
          TARGET_PKG="luci-app-adguardhome"
          
          echo "正在从官方获取最新的 index.json..."
          
          # 2. 核心解析逻辑
          # 使用 --arg 安全注入变量，直接提取 .packages 对象下对应包名的值
          OFFICIAL_VER=$(curl -sL "$FEED_URL" | jq -r --arg pkg "$TARGET_PKG" '.packages[$pkg]')
          
          # 3. 校验并输出结果
          if [ "$OFFICIAL_VER" == "null" ] || [ -z "$OFFICIAL_VER" ]; then
            echo "❌ 解析失败：在官方 JSON 中未找到 $TARGET_PKG 的信息"
            exit 1
          fi
          
          echo "✅ 解析成功！"
          echo "========================================"
          echo "目标插件: $TARGET_PKG"
          echo "官方版本: $OFFICIAL_VER"
          echo "========================================"
          
          # (可选) 将其写入环境变量，供后续真实 workflow 的其他 step 使用
          echo "LATEST_VERSION=$OFFICIAL_VER" >> "$GITHUB_ENV"

      - name: Verify Environment Variable
        run: |
          echo "通过环境变量读取到的版本号为: $LATEST_VERSION"
